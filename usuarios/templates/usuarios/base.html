{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME+ {% block titulo %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: rgba(201,168,76,0.15);
            --dark: #0d0d0d;
            --card-bg: rgba(13, 12, 9, 0.88);
            --border: rgba(201,168,76,0.22);
            --text: #f0ece4;
            --text-muted: #9a9080;
            --error: #e05252;
            --success: #5aaa7a;
            --warning: #d4903a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

        .bg-scene {
            position: fixed; inset: 0; z-index: 0;
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .bg-scene::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(120deg, rgba(8,7,4,0.85) 0%, rgba(8,7,4,0.55) 50%, rgba(8,7,4,0.78) 100%);
        }

        .page-wrapper {
            position: relative; z-index: 1; min-height: 100vh;
            display: flex; align-items: center; justify-content: flex-end; padding: 40px 6vw;
        }
        .page-wrapper.centered { justify-content: center; }

        .hero-left {
            flex: 1; max-width: 480px; margin-right: 60px;
            animation: fadeUp 0.9s ease both;
        }
        .hero-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.9rem, 3.5vw, 2.8rem);
            font-weight: 700; line-height: 1.2; color: #fff; margin-bottom: 14px;
        }
        .hero-left h1 em { font-style: normal; color: var(--gold); }
        .hero-left p { color: var(--text-muted); font-size: 0.93rem; line-height: 1.75; margin-bottom: 28px; }
        .feature-list { list-style: none; display: flex; flex-direction: column; gap: 11px; }
        .feature-list li { display: flex; align-items: center; gap: 10px; font-size: 0.86rem; color: #c0b8a8; }
        .feature-list li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
            padding: 38px 34px; width: 100%; max-width: 440px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.65), 0 0 0 1px rgba(201,168,76,0.06);
            animation: fadeUp 0.6s ease both;
        }
        .card-wide { max-width: 580px; }

        .logo { text-align: center; margin-bottom: 26px; }
        .logo-mark { font-family: 'Playfair Display', serif; font-size: 1.85rem; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
        .logo-mark span { color: #fff; }
        .logo-sub { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }

        h2 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #fff; margin-bottom: 22px; text-align: center; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.73rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .form-control {
            width: 100%; padding: 11px 13px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
            transition: border 0.2s, background 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--gold); background: rgba(201,168,76,0.07); }
        .form-control::placeholder { color: rgba(255,255,255,0.18); }
        select.form-control option { background: #161410; color: var(--text); }
        textarea.form-control { resize: vertical; min-height: 88px; }

        .btn {
            width: 100%; padding: 13px; background: var(--gold); color: #0d0b07;
            border: none; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600; letter-spacing: 0.3px;
            cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; margin-top: 8px;
        }
        .btn:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.28); }
        .btn:active { transform: translateY(0); }
        .btn-ghost {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-muted); margin-top: 10px;
        }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); box-shadow: none; }

        .errorlist { list-style: none; margin-top: 4px; }
        .errorlist li { font-size: 0.77rem; color: var(--error); padding-top: 3px; }

        .messages { margin-bottom: 18px; }
        .alert { padding: 10px 13px; border-radius: 8px; font-size: 0.84rem; margin-bottom: 7px; border-left: 3px solid; }
        .alert-success { background: rgba(90,170,122,0.11); border-color: var(--success); color: #7dd4a3; }
        .alert-error   { background: rgba(224,82,82,0.11);  border-color: var(--error);   color: #f08080; }
        .alert-warning { background: rgba(212,144,58,0.11); border-color: var(--warning); color: #e0a95a; }
        .alert-info    { background: rgba(201,168,76,0.09); border-color: var(--gold);    color: var(--gold-light); }

        .links { text-align: center; margin-top: 18px; font-size: 0.84rem; color: var(--text-muted); }
        .links a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
        .links a:hover { color: var(--gold-light); }
        .divider { margin: 5px 0; opacity: 0.35; }

        .row { display: flex; gap: 13px; }
        .row .form-group { flex: 1; }

        .line-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

        .tabs { display: flex; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 22px; }
        .tab-btn {
            flex: 1; padding: 9px; border: none; border-radius: 7px;
            background: transparent; color: var(--text-muted);
            font-family: 'DM Sans', sans-serif; font-size: 0.87rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; display: block;
        }
        .tab-btn.active { background: var(--gold); color: #0d0b07; font-weight: 600; }
        .tab-btn:hover:not(.active) { color: var(--gold); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .page-wrapper { padding: 20px 16px; justify-content: center; }
            .hero-left { display: none; }
            .card { max-width: 100%; padding: 26px 20px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<div class="bg-scene" style="background-image: url('{% block bg_image %}{% static 'usuarios/fondo2.jpg' %}{% endblock %}');"></div>

<div class="page-wrapper {% block wrapper_class %}{% endblock %}">
    {% block hero %}{% endblock %}

    <div class="card {% block card_class %}{% endblock %}">
        <div class="logo">
            <div class="logo-mark"><span>HOME</span>+</div>
            <div class="logo-sub">Servicios para tu hogar</div>
        </div>

        {% block content %}{% endblock %}
    </div>
</div>
</body>
</html>
