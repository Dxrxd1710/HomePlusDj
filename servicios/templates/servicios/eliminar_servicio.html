<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Eliminar Servicio | Home+</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
beige:"#CCB58E",
blacksoft:"#1F1F1F"
}
}
}
}
</script>

</head>

<body class="bg-blacksoft text-white flex justify-center items-center min-h-screen">

<div class="bg-white/5 p-8 rounded-2xl border border-white/10 text-center max-w-md w-full">

<h2 class="text-2xl font-bold mb-4">
¿Eliminar servicio?
</h2>

<p class="text-gray-400 mb-4">
Esta acción no se puede deshacer
</p>

{% if servicio.imagen %}
<img src="{{ servicio.imagen.url }}" class="h-40 w-full object-cover rounded-xl mb-4 border border-white/10">
{% endif %}

<p class="font-semibold mb-6">
{{ servicio.titulo }}
</p>

<form method="POST">
{% csrf_token %}

<div class="flex gap-4">

<button class="bg-red-500 hover:bg-red-600 w-full py-3 rounded-xl font-semibold">
Eliminar
</button>

<a href="{% url 'servicios:dashboard' %}" class="bg-white/10 w-full py-3 rounded-xl">
Cancelar
</a>

</div>

</form>

</div>

</body>
</html>
